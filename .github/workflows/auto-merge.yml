name: Auto Merge Safe PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    # Don't auto-merge PRs from bots modifying CI
    if: >
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite.pull_requests;
              if (prs.length === 0) return core.setOutput('skip', 'true');
              prNumber = prs[0].number;
            } else if (context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
            } else {
              prNumber = context.payload.pull_request.number;
            }
            core.setOutput('number', prNumber);
            core.setOutput('skip', 'false');

      - name: Check for destructive changes
        if: steps.pr.outputs.skip != 'true'
        id: destructive-check
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Skip if already merged or closed
            if (pr.merged || pr.state === 'closed') {
              core.setOutput('destructive', 'skip');
              return;
            }

            // Require at least one approval
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const approved = reviews.some(r => r.state === 'APPROVED');
            // For auto-merge, we'll allow without approval since Codex CR uses comments
            // But check CI status
            const { data: status } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });
            const allPassed = status.check_runs.length === 0 ||
              status.check_runs.every(c => c.conclusion === 'success');

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const destructivePatterns = [
              /DROP\s+TABLE/i,
              /TRUNCATE/i,
              /rm\s+-rf/i,
              /DROP\s+DATABASE/i,
            ];

            const deletedFiles = files.filter(f => f.status === 'removed');
            const modifiedCI = files.filter(f => f.filename.startsWith('.github/workflows/'));
            let hasDestructiveContent = false;
            for (const file of files) {
              if (file.patch) {
                for (const pattern of destructivePatterns) {
                  if (pattern.test(file.patch)) {
                    hasDestructiveContent = true;
                    break;
                  }
                }
              }
              if (hasDestructiveContent) break;
            }

            const isDestructive =
              deletedFiles.length > 0 ||
              modifiedCI.length > 0 ||
              hasDestructiveContent;

            if (isDestructive) {
              const reasons = [];
              if (deletedFiles.length > 0) reasons.push(`Files deleted: ${deletedFiles.map(f=>f.filename).join(', ')}`);
              if (modifiedCI.length > 0) reasons.push(`CI files modified: ${modifiedCI.map(f=>f.filename).join(', ')}`);
              if (hasDestructiveContent) reasons.push('Destructive commands detected in diff');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `:warning: **Auto-merge blocked** - destructive changes detected:\n${reasons.map(r => '- ' + r).join('\n')}\n\nManual review required.`
              });
              core.setOutput('destructive', 'true');
            } else {
              core.setOutput('destructive', 'false');
            }

      - name: Enable auto-merge
        if: steps.pr.outputs.skip != 'true' && steps.destructive-check.outputs.destructive == 'false'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.pr.outputs.number }}
          merge-method: squash
