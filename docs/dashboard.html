<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stress Test - Quality Analysis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; max-width: 1400px; margin: 0 auto; }
h1 { color: #58a6ff; font-size: 28px; margin-bottom: 4px; }
.subtitle { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
h2 { color: #c9d1d9; font-size: 18px; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #21262d; }

.grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; text-align: center; }
.card .value { font-size: 32px; font-weight: 700; }
.card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.blue .value { color: #58a6ff; } .green .value { color: #3fb950; }
.orange .value { color: #d29922; } .red .value { color: #f85149; }
.purple .value { color: #bc8cff; } .cyan .value { color: #39d2c0; }

.progress-bar { height: 10px; background: #21262d; border-radius: 5px; overflow: hidden; margin: 8px 0; }
.progress-bar .fill { height: 100%; border-radius: 5px; }

.chart-row { display: flex; gap: 24px; margin: 16px 0; flex-wrap: wrap; }
.chart-box { flex: 1; min-width: 300px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
.chart-box h3 { font-size: 13px; color: #8b949e; margin-bottom: 12px; }

.bar-chart { display: flex; gap: 2px; align-items: flex-end; height: 140px; }
.bar-chart .bar { flex: 1; min-width: 6px; border-radius: 3px 3px 0 0; position: relative; cursor: pointer; transition: opacity 0.2s; }
.bar-chart .bar:hover { opacity: 0.8; }
.bar-chart .bar .tip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #30363d; padding: 4px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; z-index: 10; }
.bar-chart .bar:hover .tip { display: block; }

.table-wrap { max-height: 600px; overflow-y: auto; border: 1px solid #30363d; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #161b22; color: #8b949e; text-align: left; padding: 6px 10px; font-weight: 600; position: sticky; top: 0; z-index: 1; }
td { padding: 5px 10px; border-bottom: 1px solid #21262d; }
tr:hover td { background: #161b22; }

.badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge.p1 { background: #f8514920; color: #f85149; }
.badge.p2 { background: #d2992220; color: #d29922; }
.badge.ok { background: #3fb95020; color: #3fb950; }
.badge.warn { background: #d2992220; color: #d29922; }
.badge.bad { background: #f8514920; color: #f85149; }

.pipeline { display: flex; align-items: center; gap: 6px; margin: 12px 0; flex-wrap: wrap; }
.pipeline .step { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 14px; text-align: center; }
.pipeline .step .name { font-size: 10px; color: #8b949e; }
.pipeline .step .val { font-size: 20px; font-weight: 700; }
.pipeline .arrow { color: #484f58; font-size: 18px; }

.distribution { display: flex; gap: 16px; flex-wrap: wrap; margin: 8px 0; }
.dist-item { text-align: center; }
.dist-item .num { font-size: 20px; font-weight: 700; }
.dist-item .desc { font-size: 10px; color: #8b949e; }

.findings-table { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin: 8px 0; }
.finding-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 12px; }
.finding-card .name { font-weight: 600; color: #58a6ff; }
.finding-card .detail { color: #8b949e; font-size: 11px; margin-top: 2px; }

.remaining { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 6px; }
.remaining .item { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #8b949e; }
</style>
</head>
<body>

<h1>AI Stress Test - Quality Analysis</h1>
<div class="subtitle" id="ts"></div>

<div class="grid4" id="cards"></div>

<div class="pipeline" id="pipe"></div>

<div class="progress-bar"><div class="fill" id="prog" style="background:linear-gradient(90deg,#3fb950,#58a6ff)"></div></div>
<div style="display:flex;justify-content:space-between;font-size:12px;color:#8b949e;margin-bottom:24px">
  <span id="pLabel"></span><span id="pRight"></span>
</div>

<h2>Code Quality Metrics</h2>
<div class="chart-row">
  <div class="chart-box">
    <h3>Codex CR Findings per PR (P1 red, P2 yellow)</h3>
    <div class="bar-chart" id="findChart"></div>
  </div>
  <div class="chart-box">
    <h3>Source Lines per Component</h3>
    <div class="bar-chart" id="lineChart"></div>
  </div>
</div>

<div class="chart-row">
  <div class="chart-box">
    <h3>Test Ratio (test lines / src lines)</h3>
    <div class="bar-chart" id="ratioChart"></div>
  </div>
  <div class="chart-box">
    <h3>Type Hints per Component</h3>
    <div class="bar-chart" id="hintChart"></div>
  </div>
</div>

<h2>Quality Summary</h2>
<div class="grid4" id="qualCards"></div>

<h2>PR Details</h2>
<div class="table-wrap">
  <table>
    <thead><tr><th>#</th><th>Component</th><th>Src</th><th>Tests</th><th>Lines</th><th>TestL</th><th>Ratio</th><th>Hints</th><th>Docs</th><th>Errors</th><th>P1</th><th>P2</th><th>Total</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<h2>Remaining Issues</h2>
<div class="remaining" id="remain"></div>

<script>
const PRS = [{"number":84,"component":"027-qr-encoder","srcFiles":7,"testFiles":10,"srcLines":731,"testLines":270,"typeHints":53,"docstrings":17,"errorHandling":3,"p1":1,"p2":4},{"number":83,"component":"002-template-engine","srcFiles":6,"testFiles":6,"srcLines":827,"testLines":357,"typeHints":81,"docstrings":37,"errorHandling":28,"p1":2,"p2":4},{"number":82,"component":"Implement RFC 6455 WebSocket S","srcFiles":0,"testFiles":0,"srcLines":1327,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":2,"p2":12},{"number":81,"component":"035-mail-parser","srcFiles":3,"testFiles":2,"srcLines":319,"testLines":254,"typeHints":11,"docstrings":10,"errorHandling":9,"p1":3,"p2":3},{"number":80,"component":"Spreadsheet Formula Evaluator ","srcFiles":0,"testFiles":0,"srcLines":1510,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":7,"p2":1},{"number":79,"component":"Multi-format Config Loader Imp","srcFiles":0,"testFiles":0,"srcLines":1095,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":3,"p2":3},{"number":78,"component":"Implement Pure Python Diff Eng","srcFiles":0,"testFiles":0,"srcLines":844,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":2,"p2":1},{"number":77,"component":"Implement Simple Programming L","srcFiles":0,"testFiles":0,"srcLines":1672,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":1,"p2":3},{"number":76,"component":"Implement Rate Limiter (Token ","srcFiles":0,"testFiles":0,"srcLines":371,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":3,"p2":0},{"number":75,"component":"Full-text Search Engine Implem","srcFiles":0,"testFiles":0,"srcLines":743,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":2,"p2":3},{"number":74,"component":"019-virtual-dom","srcFiles":7,"testFiles":4,"srcLines":588,"testLines":328,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":5,"p2":2},{"number":73,"component":"Implement pure Python job sche","srcFiles":0,"testFiles":0,"srcLines":1091,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":4,"p2":4},{"number":72,"component":"010-toml-parser","srcFiles":5,"testFiles":5,"srcLines":817,"testLines":254,"typeHints":41,"docstrings":23,"errorHandling":38,"p1":4,"p2":5},{"number":71,"component":"008-graph-lib","srcFiles":5,"testFiles":6,"srcLines":483,"testLines":458,"typeHints":49,"docstrings":19,"errorHandling":5,"p1":4,"p2":4},{"number":70,"component":"026-audio-synth","srcFiles":7,"testFiles":8,"srcLines":434,"testLines":329,"typeHints":19,"docstrings":12,"errorHandling":11,"p1":0,"p2":6},{"number":69,"component":"Implement pure-Python Make-lik","srcFiles":0,"testFiles":0,"srcLines":1081,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":3,"p2":2},{"number":68,"component":"JSONPath Query Engine Implemen","srcFiles":0,"testFiles":0,"srcLines":1069,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":2,"p2":3},{"number":67,"component":"JSON Schema Validator Implemen","srcFiles":0,"testFiles":0,"srcLines":972,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":1,"p2":5},{"number":66,"component":"Implement PNG Image Writer fro","srcFiles":0,"testFiles":0,"srcLines":575,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":1,"p2":1},{"number":65,"component":"031-expression-parser","srcFiles":6,"testFiles":4,"srcLines":579,"testLines":285,"typeHints":33,"docstrings":26,"errorHandling":14,"p1":0,"p2":0},{"number":64,"component":"Implement Encoding & Hash Tool","srcFiles":0,"testFiles":0,"srcLines":783,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":1,"p2":2},{"number":63,"component":"014-maze-gen","srcFiles":17,"testFiles":3,"srcLines":576,"testLines":139,"typeHints":47,"docstrings":24,"errorHandling":4,"p1":1,"p2":2},{"number":62,"component":"DNS Client (from scratch) Impl","srcFiles":0,"testFiles":0,"srcLines":1394,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":7,"p2":1},{"number":61,"component":"006-btree","srcFiles":1,"testFiles":1,"srcLines":346,"testLines":188,"typeHints":42,"docstrings":14,"errorHandling":2,"p1":1,"p2":2},{"number":60,"component":"038-undo-manager","srcFiles":4,"testFiles":3,"srcLines":291,"testLines":266,"typeHints":35,"docstrings":13,"errorHandling":4,"p1":2,"p2":0},{"number":59,"component":"Promise/A+ Library Implementat","srcFiles":0,"testFiles":0,"srcLines":3230,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":1,"p2":2},{"number":58,"component":"023-socket-chat","srcFiles":3,"testFiles":2,"srcLines":542,"testLines":244,"typeHints":53,"docstrings":33,"errorHandling":18,"p1":1,"p2":3},{"number":57,"component":"LRU Cache with TTL Implementat","srcFiles":0,"testFiles":0,"srcLines":442,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":1,"p2":1},{"number":56,"component":"001-cron-parser","srcFiles":5,"testFiles":4,"srcLines":478,"testLines":200,"typeHints":21,"docstrings":19,"errorHandling":17,"p1":3,"p2":4},{"number":55,"component":"Implement RBAC Permission Engi","srcFiles":0,"testFiles":0,"srcLines":743,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":1,"p2":2},{"number":54,"component":"040-avl-tree","srcFiles":3,"testFiles":2,"srcLines":304,"testLines":246,"typeHints":39,"docstrings":16,"errorHandling":5,"p1":0,"p2":1},{"number":53,"component":"Regex Engine (NFA-based) Imple","srcFiles":0,"testFiles":0,"srcLines":1049,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":2,"p2":4},{"number":52,"component":"Implement Markdown to HTML Con","srcFiles":0,"testFiles":0,"srcLines":841,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":4,"p2":3},{"number":51,"component":"Implement Internationalization","srcFiles":0,"testFiles":0,"srcLines":3157,"testLines":0,"typeHints":0,"docstrings":0,"errorHandling":0,"p1":0,"p2":4}];
const REMAIN = ["[050-ci-runner] Simple CI Pipeline Runner","[049-lexer-gen] Lexer Generator","[048-merkle-tree] Merkle Tree","[047-state-machine] Finite State Machine Engine","[046-consistent-hash] Consistent Hashing","[045-mock-server] HTTP Mock Server","[044-profiler] Python Code Profiler","[043-ring-buffer] Ring Buffer & Double-Ended Queue","[042-template-literal] Template String Engine","[039-event-emitter] Event Emitter with Wildcards","[022-log-analyzer] Log File Analyzer","[020-router] Client-side Router","[018-reactive-store] Reactive State Store (RxJS-like)","[013-sudoku-solver] Sudoku Solver & Generator","[011-http-server] HTTP Server from Scratch","[004-csv-toolkit] CSV Processing Toolkit"];

const total = 50, merged = 34, remain = 16;
const totalSrc = PRS.reduce((s,p)=>s+p.srcLines,0);
const totalTest = PRS.reduce((s,p)=>s+p.testLines,0);
const totalP1 = PRS.reduce((s,p)=>s+p.p1,0);
const totalP2 = PRS.reduce((s,p)=>s+p.p2,0);
const avgRatio = (PRS.reduce((s,p)=>s+p.testLines,0) / PRS.reduce((s,p)=>s+p.srcLines,0)).toFixed(2);
const avgHints = Math.round(PRS.reduce((s,p)=>s+p.typeHints,0)/PRS.length);
const avgDocs = Math.round(PRS.reduce((s,p)=>s+p.docstrings,0)/PRS.length);
const zeroFindings = PRS.filter(p=>p.p1+p.p2===0).length;

document.getElementById('ts').textContent = 'Generated: 2026-04-01 | Repo: muumuu8181/ai-stress-test | 34 components merged, 16 pending';
document.getElementById('pLabel').textContent = merged + ' merged (' + Math.round(merged/total*100) + '%)';
document.getElementById('pRight').textContent = remain + ' remaining';
document.getElementById('prog').style.width = (merged/total*100)+'%';

document.getElementById('cards').innerHTML = [
  {l:'Merged',v:merged,c:'green'},{l:'Lines Written',v:totalSrc.toLocaleString(),c:'blue'},
  {l:'Test Lines',v:totalTest.toLocaleString(),c:'cyan'},{l:'P1 Findings',v:totalP1,c:'red'},
  {l:'P2 Findings',v:totalP2,c:'orange'},{l:'Remaining',v:remain,c:'purple'}
].map(c=>'<div class="card '+c.c+'"><div class="value">'+c.v+'</div><div class="label">'+c.l+'</div></div>').join('');

document.getElementById('pipe').innerHTML = [
  {n:'Issues',v:total,cl:'#8b949e'},{n:'PRs',v:merged,cl:'#58a6ff'},
  {n:'CR Reviewed',v:merged-1,cl:'#d29922'},{n:'Merged',v:merged,cl:'#3fb950'}
].map((s,i,a)=>{
  let h='<div class="step"><div class="name">'+s.n+'</div><div class="val" style="color:'+s.cl+'">'+s.v+'</div></div>';
  if(i<a.length-1) h+='<div class="arrow">→</div>';
  return h;
}).join('');

document.getElementById('qualCards').innerHTML = [
  {l:'Avg Test Ratio',v:avgRatio,c:'cyan'},{l:'Avg Type Hints',v:avgHints,c:'blue'},
  {l:'Avg Docstrings',v:avgDocs,c:'purple'},{l:'Zero-Finding PRs',v:zeroFindings+'/34',c:'green'},
  {l:'Avg Findings/PR',v:((totalP1+totalP2)/merged).toFixed(1),c:'orange'},
  {l:'README Coverage',v:'100%',c:'green'}
].map(c=>'<div class="card '+c.c+'"><div class="value">'+c.v+'</div><div class="label">'+c.l+'</div></div>').join('');

function mkChart(id, data, color, maxKey) {
  const mx = Math.max(...data.map(d=>d[maxKey]));
  document.getElementById(id).innerHTML = data.map(d=>{
    const h = Math.max(d[maxKey]/mx*100, 2);
    return '<div class="bar" style="height:'+h+'%;background:'+color+'"><div class="tip">#'+d.number+' '+d[maxKey]+'</div></div>';
  }).join('');
}

const sorted = [...PRS].sort((a,b)=>a.number-b.number);
// Findings chart with split colors
document.getElementById('findChart').innerHTML = sorted.map(d=>{
  const mx = Math.max(...PRS.map(p=>p.p1+p.p2));
  const h = Math.max((d.p1+d.p2)/mx*100, 2);
  const p1h = d.p1+d.p2>0 ? (d.p1/(d.p1+d.p2)*100) : 0;
  return '<div class="bar" style="height:'+h+'%;background:linear-gradient(to top,#d29922 '+p1h+'%,#f85149 '+p1h+'%)"><div class="tip">#'+d.number+': '+d.p1+'P1 + '+d.p2+'P2</div></div>';
}).join('');

mkChart('lineChart', sorted, '#3fb950', 'srcLines');
mkChart('ratioChart', sorted, '#39d2c0', 'testLines');
mkChart('hintChart', sorted, '#bc8cff', 'typeHints');

document.getElementById('tbody').innerHTML = sorted.map(d=>{
  const ratio = d.srcLines>0?(d.testLines/d.srcLines).toFixed(2):'0';
  const rCls = ratio>=0.8?'ok':ratio>=0.5?'warn':'bad';
  return '<tr><td><a href="https://github.com/muumuu8181/ai-stress-test/pull/'+d.number+'" style="color:#58a6ff">'+d.number+'</a></td>'
    +'<td>'+d.component+'</td>'
    +'<td>'+d.srcFiles+'</td><td>'+d.testFiles+'</td>'
    +'<td>'+d.srcLines+'</td><td>'+d.testLines+'</td>'
    +'<td><span class="badge '+rCls+'">'+ratio+'</span></td>'
    +'<td>'+d.typeHints+'</td><td>'+d.docstrings+'</td><td>'+d.errorHandling+'</td>'
    +'<td>'+(d.p1>0?'<span class="badge p1">'+d.p1+'</span>':'-')+'</td>'
    +'<td>'+(d.p2>0?'<span class="badge p2">'+d.p2+'</span>':'-')+'</td>'
    +'<td>'+(d.p1+d.p2)+'</td></tr>';
}).join('');

document.getElementById('remain').innerHTML = REMAIN.map(r=>'<div class="item">'+r+'</div>').join('');
</script>
</body>
</html>
